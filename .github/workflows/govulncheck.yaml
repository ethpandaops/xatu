name: govulncheck

on:
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/govulncheck.yaml'

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25.x'
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: |
          set +e
          OUTPUT=$(govulncheck ./... 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$OUTPUT"

          if [ $EXIT_CODE -eq 0 ]; then
            echo ""
            echo "No vulnerabilities found"
            exit 0
          fi

          # Known unfixable vulnerabilities — all have no upstream fix available:
          #   - GO-2026-4479: pion/dtls/v2 (transitive via libp2p in pkg/mimicry)
          #   - GO-2026-4883: docker/docker off-by-one in plugin privilege validation
          #     (transitive via testcontainers-go, only used by the code-gen tool
          #     pkg/consumoor/route/cmd/generate — not in any runtime binary)
          #   - GO-2026-4887: docker/docker AuthZ plugin bypass on oversized bodies
          #     (same source as GO-2026-4883 — code-gen tool only)
          # Verify that ONLY these expected vulnerabilities are reported.
          UNEXPECTED=$(echo "$OUTPUT" \
            | grep -oE "GO-[0-9]+-[0-9]+" \
            | sort -u \
            | grep -vE "^(GO-2026-4479|GO-2026-4883|GO-2026-4887)$" || true)
          if [ -z "$UNEXPECTED" ]; then
            echo ""
            echo "Only known unfixable vulnerabilities found — no upstream fix available"
            exit 0
          fi

          echo ""
          echo "Unexpected vulnerabilities detected:"
          echo "$UNEXPECTED"

          echo ""
          echo "New vulnerabilities found! Please fix them before merging."
          exit 1
