version: "2"
run:
  issues-exit-code: 1
linters:
  default: none
  enable:
    - asasalint
    - bidichk
    - bodyclose
    - containedctx
    - copyloopvar
    - decorder
    - dogsled
    - durationcheck
    - errcheck
    - errname
    - goconst
    - gocritic
    - gocyclo
    - goheader
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - nlreturn
    - nolintlint
    - nosprintfhostport
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - staticcheck
    - tagliatelle
    - thelper
    - tparallel
    - exhaustive
    - protogetter
    - sloglint
    - unconvert
    - unused
    - whitespace
    - wsl_v5
  settings:
    errcheck:
      check-type-assertions: true
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    govet:
      enable:
        - shadow
    exhaustive:
      default-signifies-exhaustive: true
    nolintlint:
      require-explanation: true
      require-specific: true
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gocritic
          - gosec
          - wsl
        path: _test\.go
      # EL cannon code (derivers + routes) repeats cryo/ClickHouse column names
      # (a fixed external vocabulary) across many per-dataset files; goconst flags
      # the shared names but turning column identifiers into Go constants adds no
      # real value.
      - linters:
          - goconst
        path: execution/
      # CL cannon derivers repeat the logrus "module"/"type" field keys across
      # many per-type files; these are a fixed convention shared by every deriver
      # and turning them into Go constants adds no real value.
      - linters:
          - goconst
        path: cannon/deriver/beacon/
      # ClickHouse route snapshot tests repeat ClickHouse column-name assertion
      # keys (a fixed external vocabulary) across many per-type files; turning
      # these identifiers into Go constants adds no real value.
      - linters:
          - goconst
        path: clickhouse/route/canonical/
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
