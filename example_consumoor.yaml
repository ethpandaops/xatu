logging: "info"
metricsAddr: ":9090"
# pprofAddr: ":6060"

kafka:
  brokers:
    - localhost:9092
  topics:
    - "^general-.+"
  consumerGroup: xatu-consumoor-general
  encoding: json  # switch to "protobuf" after Vector removal
  # offsetDefault: earliest
  # fetchMinBytes: 1
  # fetchWaitMaxMs: 500
  # maxPartitionFetchBytes: 3145728
  # fetchMaxBytes: 10485760
  # sessionTimeoutMs: 30000
  # rebalanceTimeout: 15s   # max time for members to rejoin during rebalance
  commitInterval: 5s      # Kafka offset commit interval
  # shutdownTimeout: 30s  # max wait for in-flight messages during graceful shutdown
  # lagPollInterval: 30s  # consumer lag poll interval (0 to disable)
  # rejectedTopic: xatu-consumoor-rejected
  # topicRefreshInterval: 60s  # How often to re-discover topics matching regex patterns (0 to disable)
  # outputBatchCount: 1000  # messages per Benthos output batch (0 to disable)
  # outputBatchPeriod: 1s   # max wait before flushing partial batch
  # maxInFlight: 64         # concurrent WriteBatch calls per stream (higher = more throughput)
  # topicOverrides:         # per-topic batch settings (exact topic name match)
  #   general-beacon-block:
  #     outputBatchCount: 100
  #     outputBatchPeriod: 100ms
  #     maxInFlight: 4
  #   general-beacon-attestation:
  #     outputBatchCount: 50000
  #     outputBatchPeriod: 5s
  # tls:
  #   enabled: false
  #   caFile: /path/to/ca.pem
  #   certFile: /path/to/client-cert.pem
  #   keyFile: /path/to/client-key.pem
  #   insecureSkipVerify: false
  # sasl:
  #   mechanism: PLAIN
  #   user: "username"
  #   password: "password"

clickhouse:
  dsn: "clickhouse://localhost:9000/default"
  # failOnMissingTables: true  # set to false to downgrade missing table errors to warnings
  # tls:
  #   enabled: false
  #   caFile: /path/to/ca.pem
  #   certFile: /path/to/client-cert.pem
  #   keyFile: /path/to/client-key.pem
  #   insecureSkipVerify: false
  # chgo:
  #   dialTimeout: 5s
  #   readTimeout: 30s
  #   queryTimeout: 30s
  #   maxRetries: 3
  #   retryBaseDelay: 100ms
  #   retryMaxDelay: 2s
  #   maxConns: 64
  #   minConns: 1
  #   connMaxLifetime: 1h
  #   connMaxIdleTime: 10m
  #   healthCheckPeriod: 30s
  #   poolMetricsInterval: 15s
  #   adaptiveLimiter:
  #     enabled: true        # per-table adaptive concurrency limiting (AIMD)
  #     minLimit: 1          # minimum concurrent INSERTs per table
  #     maxLimit: 50         # maximum concurrent INSERTs per table
  #     initialLimit: 8      # starting concurrency before adaptation
  #     queueInitialRejectionFactor: 2
  #     queueMaxRejectionFactor: 3
  defaults:
    bufferSize: 50000
  tables:
    # Canonical tables default to insertSettings.insert_quorum: auto (majority).
    # Set insertSettings.insert_quorum explicitly to override that behavior.
    beacon_api_eth_v1_beacon_committee:
      bufferSize: 1000000
      # insertSettings:
      #   insert_quorum: 2
      #   insert_quorum_timeout: 60000
    beacon_api_eth_v1_events_attestation:
      bufferSize: 1000000
    # canonical_beacon_block:
    #   insertSettings:
    #     insert_quorum: 3
    #     insert_quorum_timeout: 60000

# Optional: disable specific events (replaces Vector blackhole sinks)
# disabledEvents:
#   - BEACON_API_ETH_V1_DEBUG_FORK_CHOICE
#   - BEACON_API_ETH_V1_DEBUG_FORK_CHOICE_V2
