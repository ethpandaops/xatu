syntax = "proto3";

// BEACON_SYNTHETIC_* event payloads — observability events synthesized from
// inside the beacon node's processing via CL instrumentation (TYSM today).
// These don't correspond to any beacon API SSE event; they're emitted from
// internal state transitions.

package xatu.eth.v1;

option go_package = "github.com/ethpandaops/xatu/pkg/proto/eth/v1";

import "google/protobuf/descriptor.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

// PayloadStatus mirrors the spec enum from gloas/fork-choice.md:
//   PENDING (0) — block seen, waiting for payload
//   FULL    (1) — envelope received + PTC quorum met
//   EMPTY   (2) — no envelope or PTC threshold not met
//   INVALID (3) — execution validation failed
enum PayloadStatus {
  PAYLOAD_STATUS_PENDING = 0;
  PAYLOAD_STATUS_FULL = 1;
  PAYLOAD_STATUS_EMPTY = 2;
  PAYLOAD_STATUS_INVALID = 3;
}

// BuilderPendingPaymentOutcome is the resolution of a builder pending payment
// at the epoch boundary.
//   SETTLED — payment weight met quorum, promoted to pending withdrawals
//   DROPPED — payment weight did not meet quorum, dropped without payout
enum BuilderPendingPaymentOutcome {
  BUILDER_PENDING_PAYMENT_OUTCOME_SETTLED = 0;
  BUILDER_PENDING_PAYMENT_OUTCOME_DROPPED = 1;
}

// PayloadStatusResolved is emitted observe-only when fork choice resolves
// a slot's payload status. Fires on every beacon node, every transition
// (a slot may go PENDING -> FULL or PENDING -> EMPTY, etc.).
//
// PTC vote counts follow the three-state model introduced by
// consensus-specs PR #5180 (`Optional[boolean]`): a validator may vote
// positive, vote negative, or not vote at all. `payload_timeliness_votes_positive`
// is always populated (the existing PTC quorum metric); the negative and
// absent counts are populated only once the emitting CL surfaces the
// three-state breakdown, and are NULL otherwise. The relation
// `positive + negative + absent == ptc_size` holds when all three are
// non-NULL.
message PayloadStatusResolved {
  google.protobuf.UInt64Value slot = 1 [ json_name = "slot" ];

  string block_root = 2 [ json_name = "block_root" ];

  string block_hash = 3 [ json_name = "block_hash" ];

  PayloadStatus status = 4 [ json_name = "status" ];

  PayloadStatus previous_status = 5 [ json_name = "previous_status" ];

  // Count of PTC votes with payload_present=true.
  google.protobuf.UInt64Value payload_timeliness_votes_positive = 6
      [ json_name = "payload_timeliness_votes_positive" ];

  // Count of PTC votes with payload_present=false (explicit negative).
  // NULL when the CL doesn't surface the three-state breakdown.
  google.protobuf.UInt64Value payload_timeliness_votes_negative = 10
      [ json_name = "payload_timeliness_votes_negative" ];

  // Count of PTC seats with no vote observed (`Optional[bool] == None`).
  // NULL when the CL doesn't surface the three-state breakdown.
  google.protobuf.UInt64Value payload_timeliness_votes_absent = 11
      [ json_name = "payload_timeliness_votes_absent" ];

  // Count of PTC votes with blob_data_available=true.
  google.protobuf.UInt64Value data_available_votes_positive = 7
      [ json_name = "data_available_votes_positive" ];

  // Count of PTC votes with blob_data_available=false (explicit negative).
  // NULL when the CL doesn't surface the three-state breakdown.
  google.protobuf.UInt64Value data_available_votes_negative = 12
      [ json_name = "data_available_votes_negative" ];

  // Count of PTC seats with no data-availability vote observed
  // (`Optional[bool] == None`). NULL when the CL doesn't surface the
  // three-state breakdown.
  google.protobuf.UInt64Value data_available_votes_absent = 13
      [ json_name = "data_available_votes_absent" ];

  // Total PTC committee size (typically 512).
  google.protobuf.UInt64Value ptc_size = 8 [ json_name = "ptc_size" ];

  // ResolvedAt is the wall-clock time the beacon node resolved this status.
  google.protobuf.Timestamp resolved_at = 9 [ json_name = "resolved_at" ];
}

// PayloadAttestationProcessed is emitted observe-only when a PTC vote
// message has cleared every gossip-validation check (signature, validator
// membership in the PTC committee, block-root-seen/valid, slot-current,
// first-from-this-validator dedup) and been committed for downstream
// pipeline use. This is the "Processed" enrichment counterpart to the
// gossip-receipt `BEACON_API_ETH_V1_EVENTS_PAYLOAD_ATTESTATION` event:
// observing both gives a per-validator picture of how long full validation
// took and whether the vote was actually admitted (vs. dropped at some
// validation stage). EIP-7732 ePBS.
//
// Fires on every TYSM-patched beacon node — multi-witness signal.
message PayloadAttestationProcessed {
  google.protobuf.UInt64Value slot = 1 [ json_name = "slot" ];

  // BeaconBlockRoot is the block root the PTC validator attested to.
  string beacon_block_root = 2 [ json_name = "beacon_block_root" ];

  google.protobuf.UInt64Value validator_index = 3
      [ json_name = "validator_index" ];

  // PayloadPresent / BlobDataAvailable are the two PTC vote bits.
  bool payload_present = 4 [ json_name = "payload_present" ];
  bool blob_data_available = 5 [ json_name = "blob_data_available" ];

  // PeerID we received this PTC vote from on the gossip wire.
  string peer_id = 6 [ json_name = "peer_id" ];

  // ProcessingDurationMs is the time from gossip-receipt to processing
  // completion (signature verification, PTC committee check, dedup).
  google.protobuf.UInt64Value processing_duration_ms = 7
      [ json_name = "processing_duration_ms" ];

  // ReceivedAt is the wall-clock time the PTC vote was first received
  // from the gossip wire.
  google.protobuf.Timestamp received_at = 8 [ json_name = "received_at" ];

  // ProcessedAt is the wall-clock time the PTC vote completed processing
  // and was committed for downstream consumers.
  google.protobuf.Timestamp processed_at = 9 [ json_name = "processed_at" ];
}

// BuilderPendingPaymentSettlement is emitted observe-only when a builder
// pending payment reaches an epoch boundary and is either settled into
// pending withdrawals or dropped because quorum was not met.
message BuilderPendingPaymentSettlement {
  google.protobuf.UInt64Value epoch = 1 [ json_name = "epoch" ];

  google.protobuf.UInt64Value builder_index = 2
      [ json_name = "builder_index" ];

  string fee_recipient = 3 [ json_name = "fee_recipient" ];

  // Amount is the payment amount in Gwei.
  google.protobuf.UInt64Value amount = 4 [ json_name = "amount" ];

  // Weight is the quorum weight achieved.
  google.protobuf.UInt64Value weight = 5 [ json_name = "weight" ];

  // Quorum is the threshold needed.
  google.protobuf.UInt64Value quorum = 6 [ json_name = "quorum" ];

  BuilderPendingPaymentOutcome outcome = 7 [ json_name = "outcome" ];

  // ResolvedAt is the wall-clock time the beacon node processed this settlement.
  google.protobuf.Timestamp resolved_at = 8 [ json_name = "resolved_at" ];
}
